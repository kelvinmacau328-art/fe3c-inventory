<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FE3C 庫存管理系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        /* 針對新功能的微調 CSS (保留 SortableJS 與下拉選單所需的樣式) */
        .drag-handle { cursor: grab; color: #bbb; font-size: 16px; padding: 0 10px; }
        .drag-handle:active { cursor: grabbing; color: #000; }
        select.category-select { padding: 8px; border: 1px solid #e0e0e0; border-radius: 4px; background: #fdfdfd; outline: none; font-size: 12px; }
        .year-tab-container { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 2px dashed #eee; display: flex; flex-wrap: wrap; gap: 8px; }
    </style>
</head>
<body>

    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease;">
        <h2 style="border: none; margin: 0; letter-spacing: 4px;">FE3C SYSTEM</h2>
        <p id="loadingText" style="color: #888; font-size: 12px; letter-spacing: 2px;">正在連線雲端資料庫...</p>
    </div>

    <h2>📦 FE3C 庫存管理系統 <span>// 雲端跨裝置版</span></h2>

    <div class="tab">
        <button class="tablinks" onclick="openTab(event, 'Overview')" id="defaultOpen">總覽</button>
        <button class="tablinks" onclick="openTab(event, 'Internal')">內部調整</button>
        <button class="tablinks" onclick="openTab(event, 'Distributors')">經銷商管理</button>
    </div>

    <div id="Overview" class="tabcontent">
        <div class="controls" style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div>
                <button class="btn" id="btn-add-item">+ 新增品項</button>
                <button class="btn btn-outline" style="margin-left:10px;" id="btn-reset">⚠️ 初始化/清空雲端資料</button>
            </div>
            <div>
                <span style="font-size: 11px; color: #888; margin-right: 15px;">* 拖曳左側 ☰ 可排序</span>
                <input type="text" id="searchInput" class="search-box" placeholder="搜尋貨號/品名/分類...">
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width:30px;">☰</th><th>操作</th><th>分類</th><th>貨號</th><th>品名</th><th>尺寸</th>
                        <th style="background:#f4f7f9;">大貨入庫</th><th>售價</th><th style="color:#e84118;">總庫存</th>
                        <th style="background:#f8f9fa; color:#2980b9;">倉庫庫存</th><th style="color:#e84118;">店庫存總和</th>
                    </tr>
                </thead>
                <tbody id="overview-body"></tbody>
            </table>
        </div>
    </div>

    <div id="Internal" class="tabcontent">
        <div class="controls">
            <input type="text" id="new-col-name" class="search-box" style="width:150px;" placeholder="輸入欄位名稱...">
            <button class="btn" id="btn-add-col">+ 新增自訂欄位</button>
        </div>
        <div class="table-container">
            <table><thead><tr id="internal-head"></tr></thead><tbody id="internal-body"></tbody></table>
        </div>
    </div>

    <div id="Distributors" class="tabcontent">
        <div class="controls" style="display:flex; justify-content:space-between; align-items:flex-end; gap:10px;">
            <div id="dist-level1-tabs" class="dist-tabs"></div>
            <div style="display:flex; align-items:center; gap:8px;">
                <input type="color" id="new-dist-color" value="#000000" style="width:30px; height:30px; border:none; background:transparent; cursor:pointer;">
                <input type="text" id="new-dist-name" class="search-box" style="width:120px;" placeholder="新經銷商名稱">
                <button class="btn" id="btn-add-dist">+ 新增</button>
            </div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
            <h3 id="current-dist-title" style="margin:0; font-weight:400;"></h3>
            <div><span style="font-size:10px; color:#888;">標籤色: </span><input type="color" id="edit-dist-color" style="border:none; background:transparent; cursor:pointer;"></div>
        </div>
        <div class="year-tab-container" id="dist-year-tabs" style="margin-top:15px;"></div>
        <div class="sub-tab" id="dist-month-tabs"></div>
        <div class="table-container"><table><thead id="dist-head"></thead><tbody id="dist-body"></tbody></table></div>
    </div>

    <div id="stockModal" class="modal-overlay" onclick="closeModal('stockModal', event)"><div class="modal-content" onclick="event.stopPropagation()"><span class="close-btn" onclick="closeModal('stockModal', true)">&times;</span><div id="modal-title-area"></div><div id="modal-body"></div></div></div>
    <div id="internalModal" class="modal-overlay" onclick="closeModal('internalModal', event)"><div class="modal-content" onclick="event.stopPropagation()"><span class="close-btn" onclick="closeModal('internalModal', true)">&times;</span><div id="internal-modal-title-area"></div><div id="internal-modal-body"></div></div></div>

    <script type="module">
        // 載入 Firebase 模組
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";

        // === 你的 Firebase Config ===
        const firebaseConfig = {
            apiKey: "AIzaSyCczS48B6ZguyH-e52z2C1CvGTJ5IQY8v8",
            authDomain: "fe3c-inventory.firebaseapp.com",
            projectId: "fe3c-inventory",
            storageBucket: "fe3c-inventory.firebasestorage.app",
            messagingSenderId: "322270690396",
            appId: "1:322270690396:web:fd46f37f5ac2b9dfbc7a99",
            measurementId: "G-ZYMXWBWZ9K"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        
        // 指定資料庫存放位置
        const dataRef = doc(db, "inventory", "mainData");

        // 狀態變數
        let items = [], internalColumns = [], distributors = [], distColors = {}, yearsList = ['2026'];
        const monthsList = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        let currentDist = '', currentYearView = '2026', currentDistView = '總覽';
        const categories = ['項鍊', '戒指', '耳環', '手鍊', '服飾', '其他'];

        // 工具函數
        const escapeHTML = (str) => typeof str !== 'string' ? str : str.replace(/[&<>'"]/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]));

        // === ☁️ 雲端儲存機制 (寫入) ===
        window.saveData = async function() {
            recalculate(); // 儲存前先計算庫存總和
            try {
                await setDoc(dataRef, { items, internalColumns, distributors, distColors, yearsList });
            } catch (error) {
                console.error("寫入失敗：", error);
                alert("雲端儲存失敗，請確認網路連線或 Firebase 權限設定！");
            }
        };

        // === ☁️ 雲端同步機制 (即時讀取) ===
        onSnapshot(dataRef, (snap) => {
            // 隱藏 Loading 畫面
            const loader = document.getElementById('loadingScreen');
            if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }

            if (snap.exists()) {
                const d = snap.data();
                items = d.items || []; internalColumns = d.internalColumns || [];
                distributors = d.distributors || []; distColors = d.distColors || {};
                yearsList = d.yearsList || ['2026'];
                if (!currentDist && distributors.length > 0) currentDist = distributors[0];
                renderAll();
            } else {
                console.log("雲端尚未建立資料");
            }
        }, (error) => {
            console.error("同步失敗：", error);
            document.getElementById('loadingText').innerHTML = "<span style='color:#e74c3c;'>無法連線，請檢查網路或 Firebase 權限！</span>";
        });

        // === 邏輯驗算 ===
        function recalculate() {
            items.forEach(item => {
                let dt = 0;
                distributors.forEach(d => {
                    let prevRem = 0;
                    yearsList.forEach((y, yi) => {
                        monthsList.forEach((m, mi) => {
                            if (!item.distDetails[d]) item.distDetails[d] = { years: {} };
                            if (!item.distDetails[d].years) item.distDetails[d].years = {}; // 防錯機制
                            if (!item.distDetails[d].years[y]) {
                                item.distDetails[d].years[y] = {};
                                monthsList.forEach(mStr => { item.distDetails[d].years[y][mStr] = { carryover:0, inbound:0, adj:0, assist:0, sales:0, discount:0.65, note:'' }; });
                            }
                            let md = item.distDetails[d].years[y][m];
                            if (yi > 0 || mi > 0) md.carryover = prevRem;
                            prevRem = md.carryover + md.inbound + md.adj - md.assist - md.sales;
                        });
                    });
                    item.dist[d] = prevRem; dt += prevRem;
                });
                let it = 0;
                internalColumns.forEach(c => {
                    if(!item.internal[c]) item.internal[c] = { total:0, logs:[] };
                    it += item.internal[c].total;
                });
                if(typeof item.inStock === 'number') item.inStock = { total: item.inStock, logs:[] };
                item.warehouse = item.inStock.total - it - dt;
            });
        }

        // === 渲染函數 ===
        function renderOverview() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            let html = '';
            items.forEach((item, index) => {
                if (kw && !item.id.toLowerCase().includes(kw) && !item.name.toLowerCase().includes(kw) && !(item.category||'').toLowerCase().includes(kw)) return;
                let dtSum = 0; distributors.forEach(d => dtSum += (item.dist[d] || 0));
                
                html += `<tr>
                    <td class="drag-handle">☰</td>
                    <td><button class="btn-danger" onclick="window.delItem(${index})">刪除</button></td>
                    <td><select class="category-select" onchange="window.upItem(${index},'category',this.value)">${categories.map(c => `<option value="${c}" ${c===item.category?'selected':''}>${c}</option>`).join('')}</select></td>
                    <td><input type="text" class="id-input" value="${escapeHTML(item.id)}" onchange="window.upItem(${index},'id',this.value)"></td>
                    <td><input type="text" class="name-input" value="${escapeHTML(item.name)}" onchange="window.upItem(${index},'name',this.value)"></td>
                    <td><input type="text" class="short-input" value="${escapeHTML(item.size)}" onchange="window.upItem(${index},'size',this.value)"></td>
                    <td style="background:#f4f7f9;"><span class="clickable-number" style="color:#16a085; border-color:#16a085;" onclick="window.openInModal(${index})">${item.inStock.total}</span></td>
                    <td><input type="number" class="short-input" value="${item.price}" onchange="window.upItem(${index},'price',this.value)"></td>
                    <td class="highlight-cell"><span class="clickable-number" onclick="window.showXRay(${index})">${item.warehouse + dtSum}</span></td>
                    <td class="auto-cell">${item.warehouse}</td>
                    <td class="highlight-cell"><span class="clickable-number" onclick="window.showXRay(${index})">${dtSum}</span></td>
                </tr>`;
            });
            document.getElementById('overview-body').innerHTML = html;
        }

        function renderInternal() {
            let h = `<th>貨號</th><th>品名</th>`; internalColumns.forEach((c, i) => h += `<th>${escapeHTML(c)} <button class="btn-danger" onclick="window.delIntCol(${i})">刪</button></th>`);
            document.getElementById('internal-head').innerHTML = h;
            let b = '';
            items.forEach((item, index) => {
                b += `<tr><td class="text-cell">${escapeHTML(item.id)}</td><td class="text-cell name-input">${escapeHTML(item.name)}</td>`;
                internalColumns.forEach(c => {
                    const d = item.internal[c] || {total:0};
                    b += `<td class="highlight-cell"><span class="clickable-number" onclick="window.openIntRecModal(${index},'${c.replace(/'/g,"\\'")}')">${d.total}</span></td>`;
                });
                b += `</tr>`;
            });
            document.getElementById('internal-body').innerHTML = b;
        }

        function renderDistTabs() {
            let h1 = ''; distributors.forEach(d => h1 += `<button class="btn-dist ${currentDist===d?'active':''}" style="border-bottom:4px solid ${distColors[d]};" onclick="window.selDist('${d}')">${escapeHTML(d)}</button>`);
            document.getElementById('dist-level1-tabs').innerHTML = h1;
            if(!currentDist) return;
            document.getElementById('current-dist-title').innerText = `📋 [ ${currentDist} ] 庫存明細`;
            document.getElementById('edit-dist-color').value = distColors[currentDist] || '#000000';
            
            let yh = ''; yearsList.forEach(y => yh += `<button class="btn-year ${currentYearView===y?'active':''}" onclick="window.selYear('${y}')">${y} 年度</button>`);
            yh += `<button class="btn-year" style="border-style:dashed;" onclick="window.addYear()">+ 新增年份</button>`;
            document.getElementById('dist-year-tabs').innerHTML = yh;

            let mh = `<button class="btn-sub ${currentDistView==='總覽'?'active':''}" onclick="window.selView('總覽')">📊 ${currentYearView} 總覽</button>`;
            monthsList.forEach(m => mh += `<button class="btn-sub ${currentDistView===m?'active':''}" onclick="window.selView('${m}')">${m}</button>`);
            document.getElementById('dist-month-tabs').innerHTML = mh;
        }

        function renderDistTable() {
            if(!currentDist) return;
            const hEl = document.getElementById('dist-head'), bEl = document.getElementById('dist-body');
            let html = '';
            if (currentDistView === '總覽') {
                hEl.innerHTML = `<tr><th>貨號</th><th>品名</th><th>${currentYearView}總補貨</th><th>${currentYearView}總銷售</th><th>剩餘庫存</th></tr>`;
                items.forEach((item, index) => {
                    let ts=0, tr=0;
                    monthsList.forEach(m => { const d = item.distDetails[currentDist].years[currentYearView][m]; ts += d.sales; tr += d.inbound; });
                    html += `<tr><td class="text-cell">${escapeHTML(item.id)}</td><td class="text-cell name-input">${escapeHTML(item.name)}</td>
                    <td class="auto-cell" style="color:#2980b9;">${tr}</td><td class="highlight-cell" style="color:#d35400;">${ts}</td>
                    <td class="highlight-cell" style="color:#27ae60; font-size: 15px;">${item.dist[currentDist]}</td></tr>`;
                });
            } else {
                hEl.innerHTML = `<tr><th>貨號</th><th>品名</th><th>售價</th><th>折數</th><th style="background:#f8f9fa; color:#2980b9;">結轉(自動)</th><th style="background:#f4f7f9;">進貨</th><th>調整</th><th>協助官方</th><th style="background:#fdfcf0;">銷售</th><th>本月剩餘</th><th>結帳金額</th><th>備註</th></tr>`;
                items.forEach((item, index) => {
                    const d = item.distDetails[currentDist].years[currentYearView][currentDistView];
                    const rem = d.carryover + d.inbound + d.adj - d.assist - d.sales; const pay = Math.round(item.price * d.discount * d.sales);
                    let isFirst = currentDistView === monthsList[0] && currentYearView === yearsList[0];
                    let coCell = isFirst ? `<td><input type="number" class="short-input" value="${d.carryover}" onchange="window.upDist(${index},'carryover',this.value)"></td>` : `<td class="auto-cell">${d.carryover}</td>`;

                    html += `<tr><td class="text-cell">${escapeHTML(item.id)}</td><td class="text-cell name-input">${escapeHTML(item.name)}</td><td>$${item.price}</td>
                    <td><input type="number" step="0.01" class="short-input" value="${d.discount}" onchange="window.upDist(${index},'discount',this.value)"></td>${coCell}
                    <td style="background:#f4f7f9;"><input type="number" class="short-input" value="${d.inbound}" style="color:#16a085; font-weight:bold;" onchange="window.upDist(${index},'inbound',this.value)"></td>
                    <td><input type="number" class="short-input" value="${d.adj}" onchange="window.upDist(${index},'adj',this.value)"></td>
                    <td><input type="number" class="short-input" value="${d.assist}" onchange="window.upDist(${index},'assist',this.value)"></td>
                    <td style="background:#fdfcf0;"><input type="number" class="short-input" value="${d.sales}" style="color:#d35400; font-weight:bold;" onchange="window.upDist(${index},'sales',this.value)"></td>
                    <td class="highlight-cell">${rem}</td><td class="highlight-cell" style="color:#27ae60;">$${pay}</td>
                    <td><input type="text" class="name-input" value="${escapeHTML(d.note)}" onchange="window.upDist(${index},'note',this.value)"></td></tr>`;
                });
            }
            bEl.innerHTML = html;
        }

        // === 視窗功能與按鈕綁定 ===
        window.upItem = (i, k, v) => { items[i][k] = k === 'price' ? parseInt(v) : v; window.saveData(); };
        window.delItem = (i) => { if(confirm('刪除商品？')) { items.splice(i,1); window.saveData(); } };
        window.selDist = (d) => { currentDist = d; currentDistView = '總覽'; renderAll(); };
        window.selYear = (y) => { currentYearView = y; currentDistView = '總覽'; renderAll(); };
        window.selView = (v) => { currentDistView = v; renderAll(); };
        window.upDist = (i, f, v) => { items[i].distDetails[currentDist].years[currentYearView][currentDistView][f] = f==='note'?v:parseFloat(v); window.saveData(); };

        // 彈窗模組
        let curI = null; window.openInModal = (i) => { curI = i; renderInModal(); document.getElementById('internalModal').style.display = 'flex'; };
        function renderInModal() { const item = items[curI], data = item.inStock; let logs = data.logs.map((l,li) => `<tr><td>${l.date}</td><td>${escapeHTML(l.note)}</td><td style="font-weight:bold;color:#16a085;">${l.qty}</td><td><button class="btn-danger" onclick="window.delInLog(${li})">刪除</button></td></tr>`).join('');
            document.getElementById('internal-modal-title-area').innerHTML = `<span class="modal-title-text">📥 大貨明細</span><h3 class="modal-title-main">${item.id}</h3>`;
            document.getElementById('internal-modal-body').innerHTML = `<div style="text-align:right; margin-bottom:10px; font-size:24px; font-weight:bold; color:#16a085;">總計: ${data.total}</div><div class="modal-input-group"><input id="in-d" value="${(new Date().getMonth()+1)+'/'+new Date().getDate()}" style="width:60px;"><input id="in-n" placeholder="備註" style="flex:1;"><input id="in-q" type="number" placeholder="量" style="width:60px;"><button class="btn" onclick="window.addInLog()">+ 新增</button></div><table class="breakdown-table"><tr><th>日期</th><th>備註</th><th>數量</th><th>操作</th></tr>${logs}</table>`; }
        window.addInLog = () => { const q = parseInt(document.getElementById('in-q').value)||0; items[curI].inStock.logs.push({date:document.getElementById('in-d').value, note:document.getElementById('in-n').value, qty:q}); items[curI].inStock.total = items[curI].inStock.logs.reduce((s,l)=>s+l.qty,0); window.saveData(); renderInModal(); };
        window.delInLog = (li) => { items[curI].inStock.logs.splice(li,1); items[curI].inStock.total = items[curI].inStock.logs.reduce((s,l)=>s+l.qty,0); window.saveData(); renderInModal(); };

        let curIntIdx = null, curIntCol = null; window.openIntRecModal = (i, c) => { curIntIdx = i; curIntCol = c; renderIntRecModal(); document.getElementById('internalModal').style.display = 'flex'; };
        function renderIntRecModal() { const item = items[curIntIdx], data = item.internal[curIntCol]; let logs = data.logs.map((l,li) => `<tr><td>${l.date}</td><td>${escapeHTML(l.note)}</td><td style="font-weight:bold;color:#d35400;">${l.qty}</td><td><button class="btn-danger" onclick="window.delIntLog(${li})">刪除</button></td></tr>`).join('');
            document.getElementById('internal-modal-title-area').innerHTML = `<span class="modal-title-text">📝 調整明細</span><h3 class="modal-title-main">${curIntCol} (${item.id})</h3>`;
            document.getElementById('internal-modal-body').innerHTML = `<div style="text-align:right; margin-bottom:10px; font-size:24px; font-weight:bold; color:#e84118;">總計: ${data.total}</div><div class="modal-input-group"><input id="it-d" value="${(new Date().getMonth()+1)+'/'+new Date().getDate()}" style="width:60px;"><input id="it-n" placeholder="備註" style="flex:1;"><input id="it-q" type="number" placeholder="量" style="width:60px;"><button class="btn" onclick="window.addIntLog()">+ 新增</button></div><table class="breakdown-table"><tr><th>日期</th><th>備註</th><th>數量</th><th>操作</th></tr>${logs}</table>`; }
        window.addIntLog = () => { const q = parseInt(document.getElementById('it-q').value)||0; items[curIntIdx].internal[curIntCol].logs.push({date:document.getElementById('it-d').value, note:document.getElementById('it-n').value, qty:q}); items[curIntIdx].internal[curIntCol].total = items[curIntIdx].internal[curIntCol].logs.reduce((s,l)=>s+l.qty,0); window.saveData(); renderIntRecModal(); };
        window.delIntLog = (li) => { items[curIntIdx].internal[curIntCol].logs.splice(li,1); items[curIntIdx].internal[curIntCol].total = items[curIntIdx].internal[curIntCol].logs.reduce((s,l)=>s+l.qty,0); window.saveData(); renderIntRecModal(); };

        window.showXRay = (index) => {
            const item = items[index]; let dtH = distributors.map(d => `<tr><td>${d}</td><td style="color:#27ae60; font-weight:bold;">${item.dist[d]}</td></tr>`).join('');
            let itH = internalColumns.map(c => `<tr><td>${c}</td><td style="color:#d35400;">${item.internal[c].total}</td></tr>`).join('');
            document.getElementById('modal-title-area').innerHTML = `<span class="modal-title-text">🔍 庫存驗算</span><h3 class="modal-title-main">${item.id}</h3>`;
            document.getElementById('modal-body').innerHTML = `
                <div style="padding:15px; background:#f9f9f9; border-left:4px solid #000; margin-bottom:20px;"><b>倉庫庫存：${item.warehouse}</b><br><small>總入庫(${item.inStock.total}) - 內部調整 - 各店總和</small></div>
                <h4>內部損耗明細</h4><table class="breakdown-table">${itH}</table><h4 style="margin-top:20px;">經銷商剩餘明細</h4><table class="breakdown-table">${dtH}</table>`;
            document.getElementById('stockModal').style.display = 'flex';
        };

        // 按鈕事件
        document.getElementById('btn-add-item').onclick = () => { items.unshift({ id:'NEW', category:'其他', name:'新商品', size:'F', price:0, inStock:{total:0, logs:[]}, internal:{}, dist:{}, distDetails:{}, warehouse:0 }); window.saveData(); };
        document.getElementById('btn-add-col').onclick = () => { const v = document.getElementById('new-col-name').value.trim(); if(v && !internalColumns.includes(v)) { internalColumns.push(v); document.getElementById('new-col-name').value=''; window.saveData(); } };
        document.getElementById('btn-add-dist').onclick = () => { const v = document.getElementById('new-dist-name').value.trim(); if(v && !distributors.includes(v)) { distributors.push(v); distColors[v] = document.getElementById('new-dist-color').value; currentDist = v; window.saveData(); } };
        
        window.delIntCol = (i) => { if(confirm('刪除此自訂欄位？')) { internalColumns.splice(i,1); window.saveData(); } };
        window.addYear = () => { const y = prompt("新增年份 (如 2027)"); if(y && !yearsList.includes(y)){ yearsList.push(y); yearsList.sort(); window.saveData(); } };
        document.getElementById('edit-dist-color').onchange = (e) => { distColors[currentDist] = e.target.value; window.saveData(); };

        // 搜尋與拖曳
        let st; document.getElementById('searchInput').onkeyup = () => { clearTimeout(st); st = setTimeout(renderOverview, 300); };
        new Sortable(document.getElementById('overview-body'), { animation: 150, handle: '.drag-handle', onEnd: (e) => { const moved = items.splice(e.oldIndex, 1)[0]; items.splice(e.newIndex, 0, moved); window.saveData(); } });

        // 重置功能
        document.getElementById('btn-reset').onclick = () => { if(confirm('警告：這將清空雲端資料並重置為測試資料！')) { 
            items = [{ id: 'FE3C146', category: '項鍊', name: 'TUT Necklace 鐵珠吊墜', size: 'F', inStock: {total:50, logs:[{date:'-', note:'初始', qty:50}]}, price: 1280, warehouse: 50, internal: {}, dist: {}, distDetails: {} }];
            distributors = ['HYST']; internalColumns = ['樣品']; distColors = {'HYST':'#000000'}; yearsList=['2026']; window.saveData(); } 
        };
        
        // 頁籤切換
        window.openTab = (e, n) => { const tc = document.getElementsByClassName("tabcontent"), tl = document.getElementsByClassName("tablinks"); for(let i=0; i<tc.length; i++) tc[i].style.display = "none"; for(let i=0; i<tl.length; i++) tl[i].className = tl[i].className.replace(" active", ""); document.getElementById(n).style.display = "block"; e.currentTarget.className += " active"; };
        window.closeModal = (id, e) => { if (e === true || (e && e.target.id === id)) document.getElementById(id).style.display = 'none'; };

        function renderAll() { let aid = document.activeElement?document.activeElement.id:null; renderOverview(); renderInternal(); renderDistTabs(); renderDistTable(); if(aid){let el=document.getElementById(aid); if(el)el.focus();} }
        document.getElementById("defaultOpen").click();
    </script>
</body>
</html>
